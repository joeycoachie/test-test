<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimum Fit | Kinetic Diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e0e0e0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .protocol-id { font-family: 'Courier New', Courier, monospace; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 py-12">

    <div class="max-w-xl w-full bg-[#0a0a0a] border border-[#222] p-8 md:p-12 rounded-sm shadow-2xl relative overflow-hidden">
        
        <div class="text-center mb-8 border-b border-[#222] pb-6">
            <span class="protocol-id text-[#4CAF50] text-[10px] tracking-widest uppercase block mb-2">System Diagnostic</span>
            <h1 class="text-3xl font-serif text-white tracking-tight">Kinetic Baseline</h1>
        </div>

        <div id="quiz-container">
            <!-- Phase 1 -->
            <div id="q1" class="question-block">
                <p class="protocol-id text-xs text-[#3b82f6] mb-3 tracking-widest uppercase">Phase 01: Core Activation</p>
                <h2 class="text-lg text-white mb-6">What happens when you brace your core (e.g., coughing)?</h2>
                <div class="space-y-3">
                    <button onclick="nextQ(1, 'A')" class="w-full text-left p-4 border border-[#333] hover:border-[#4CAF50] bg-[#111] transition-colors rounded-sm text-sm text-[#a3a3a3]">Pressure in back / Stomach bulges</button>
                    <button onclick="nextQ(1, 'B')" class="w-full text-left p-4 border border-[#333] hover:border-[#4CAF50] bg-[#111] transition-colors rounded-sm text-sm text-[#a3a3a3]">Stomach pulls flat / Corset effect</button>
                </div>
            </div>

            <!-- Phase 2 -->
            <div id="q2" class="question-block hidden">
                <p class="protocol-id text-xs text-[#3b82f6] mb-3 tracking-widest uppercase">Phase 02: Structural Integrity</p>
                <h2 class="text-lg text-white mb-6">Recent lower back or neck pain during exercise?</h2>
                <div class="space-y-3">
                    <button onclick="nextQ(2, 'A')" class="w-full text-left p-4 border border-[#333] hover:border-[#4CAF50] bg-[#111] transition-colors rounded-sm text-sm text-[#a3a3a3]">Yes / Currently recovering</button>
                    <button onclick="nextQ(2, 'B')" class="w-full text-left p-4 border border-[#333] hover:border-[#4CAF50] bg-[#111] transition-colors rounded-sm text-sm text-[#a3a3a3]">No / Pain-free</button>
                </div>
            </div>
        </div>

        <!-- Result / Lead Capture -->
        <div id="result-container" class="hidden text-center fade-in">
            <h2 id="result-title" class="text-2xl font-serif text-white mb-4">Baseline Identified</h2>
            <p id="result-desc" class="text-[#a3a3a3] text-sm mb-6"></p>
            
            <form id="lead-form" action="https://script.google.com/macros/s/AKfycbw1ScZ-8z8rcPyYEQw_URHA4iNx1uUTs_dtlLVu82H1aUsKSLr5Vx4sFJ89tmgRNeLH/exec" method="POST" class="text-left space-y-4 border-t border-[#222] pt-6">
                <input type="hidden" name="Class_Result" id="class-result-input">
                <div>
                    <label class="text-[10px] uppercase text-[#888] tracking-widest">Full Name</label>
                    <input type="text" name="Name" required class="w-full bg-[#050505] border border-[#333] p-3 text-white">
                </div>
                <div class="flex gap-2">
                    <select name="Country_Code" class="bg-[#050505] border border-[#333] p-3 text-white w-24">
                        <option value="+60">+60</option><option value="+65">+65</option>
                    </select>
                    <input type="tel" name="Phone" required placeholder="WhatsApp" class="w-full bg-[#050505] border border-[#333] p-3 text-white">
                </div>
                <button type="submit" class="w-full bg-[#4CAF50] text-white py-3 font-bold uppercase tracking-widest text-xs">Unlock Class Allocation</button>
            </form>
        </div>
    </div>

    <script>
        let answers = { q1: '', q2: '' };
        function nextQ(curr, ans) {
            answers['q'+curr] = ans;
            document.getElementById('q'+curr).classList.add('hidden');
            if(curr === 1) document.getElementById('q2').classList.remove('hidden');
            else calculateResult();
        }
        function calculateResult() {
            const isControl = (answers.q1 === 'A' || answers.q2 === 'A');
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('result-title').innerText = isControl ? "Optimum Control" : "Optimum Capacity";
            document.getElementById('result-desc').innerText = isControl ? "Base mechanics require alignment. Start at Level 1." : "Athletic load approved. Start at Level 2.";
            document.getElementById('class-result-input').value = isControl ? "Control" : "Capacity";
        }
    </script>
</body>
</html>
